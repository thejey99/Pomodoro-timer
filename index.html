<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Timer</title>
<style>
  @font-face{
    font-family:'DSEG7';
    src:url('https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG7-Classic/DSEG7Classic-Bold.woff2') format('woff2');
    font-weight:700;font-display:swap;
  }
  html,body{margin:0;height:100%;background:#0d0d0d;font-family:system-ui,sans-serif;}
  #stage{min-height:100%;display:flex;align-items:center;justify-content:center;}
  .bar{
    display:flex;align-items:center;gap:8px;
    background:#141414;border:1px solid #262626;border-radius:12px;
    padding:6px 10px;box-sizing:border-box;
  }
  .clock{position:relative;cursor:pointer;user-select:none;line-height:1;}
  .ghost{font-family:'DSEG7',monospace;font-size:30px;color:#2a0808;letter-spacing:1px;}
  .digits{position:absolute;inset:0;font-family:'DSEG7',monospace;font-size:30px;color:#ff2b1a;letter-spacing:1px;text-shadow:0 0 6px rgba(255,43,26,0.55);}
  button{
    background:#1d1d1d;color:#ff5c4d;border:1px solid #3a1512;border-radius:8px;
    padding:4px 8px;font-size:15px;line-height:1;cursor:pointer;
  }
  button:hover{background:#262626;}
  /* in-page drag fallback */
  body.floating #stage{display:block;}
  body.floating .bar{position:fixed;bottom:12px;right:12px;z-index:9999;cursor:move;}
</style>
</head>
<body>
  <div id="stage">
    <div class="bar" id="bar">
      <div class="clock" id="clock" title="Click to pause / resume">
        <div class="ghost">88:88</div>
        <div class="digits" id="digits">25:00</div>
      </div>
      <button id="restart" title="Restart">&#8635;</button>
      <button id="popout" title="Pop out">&#8599;</button>
    </div>
  </div>

<script>
(function(){
  var TOTAL=25*60, left=TOTAL, running=true, tick=null;
  var digits=document.getElementById('digits');
  var clock=document.getElementById('clock');
  var bar=document.getElementById('bar');

  function render(){
    var m=Math.floor(left/60), s=left%60;
    digits.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  }
  function step(){
    if(!running) return;
    if(left>0){ left--; render(); }
    else { running=false; digits.style.opacity=(digits.style.opacity==='0.25'?'1':'0.25'); }
  }
  function start(){ if(tick) clearInterval(tick); tick=setInterval(step,1000); }
  function restart(){ left=TOTAL; running=true; digits.style.opacity='1'; render(); start(); }
  function toggle(){ if(left===0) return; running=!running; digits.style.opacity=running?'1':'0.4'; }

  document.getElementById('restart').addEventListener('click',restart);
  clock.addEventListener('click',toggle);

  document.getElementById('popout').addEventListener('click', async function(){
    if(!('documentPictureInPicture' in window)){ enablePageDrag(); return; }
    var pip = await documentPictureInPicture.requestWindow({ width:170, height:58 });
    [...document.styleSheets].forEach(function(ss){
      try{
        var css=[...ss.cssRules].map(function(r){return r.cssText;}).join('');
        var st=document.createElement('style'); st.textContent=css; pip.document.head.appendChild(st);
      }catch(e){
        if(ss.href){ var l=document.createElement('link'); l.rel='stylesheet'; l.href=ss.href; pip.document.head.appendChild(l); }
      }
    });
    pip.document.body.style.cssText='margin:0;background:#0d0d0d;display:flex;align-items:center;justify-content:center;height:100%;';
    pip.document.body.appendChild(bar);
    pip.addEventListener('pagehide', function(){ document.getElementById('stage').appendChild(bar); });
  });

  function enablePageDrag(){
    document.body.classList.add('floating');
    var dx=0, dy=0, down=false;
    bar.style.right='auto'; bar.style.bottom='auto'; bar.style.left='12px'; bar.style.top='12px';
    bar.addEventListener('mousedown', function(e){
      if(e.target.tagName==='BUTTON') return;
      down=true; dx=e.clientX-bar.offsetLeft; dy=e.clientY-bar.offsetTop;
    });
    window.addEventListener('mousemove', function(e){
      if(!down) return; bar.style.left=(e.clientX-dx)+'px'; bar.style.top=(e.clientY-dy)+'px';
    });
    window.addEventListener('mouseup', function(){ down=false; });
  }

  render(); start();
})();
</script>
</body>
</html>
